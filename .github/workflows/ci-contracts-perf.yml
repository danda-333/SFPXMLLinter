name: CI Contracts and Performance Gates

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  contracts:
    name: Contracts Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Run contracts
        run: npm run test:contracts

  performance:
    name: Performance Gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Linter performance gate
        run: npm run test:linter:perf

      - name: Template generators performance gate
        run: npm run test:templates:perf

  hardening:
    name: Hardening E2E Gate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Run hardening suite
        run: npm run test:hardening

  release-hardening:
    name: Release Hardening Aggregate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Run aggregate release hardening
        run: npm run test:release:hardening
